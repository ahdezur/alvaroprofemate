<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Rounded gradient background -->
  <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
  <!-- Radical square root symbol -->
  <path d="M 4,16 L 7,16 L 10,26 L 13,4 L 28,4" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Letter A -->
  <path d="M 15,25 L 20.5,14 L 26,25" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Horizontal bar of A -->
  <line x1="17.5" y1="21.5" x2="23.5" y2="21.5" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Orthographic Accent (Tilde) -->
  <line x1="20.5" y1="11" x2="23" y2="7.5" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
