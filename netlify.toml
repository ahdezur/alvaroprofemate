[build]
  publish = "."
  functions = "netlify/functions"

# Redirigir peticiones de /api/posts a la función serverless de Netlify
[[redirects]]
  from = "/api/posts"
  to = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/posts/*"
  to = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/courses"
  to = "/.netlify/functions/courses"
  status = 200

[[redirects]]
  from = "/api/courses/*"
  to = "/.netlify/functions/courses"
  status = 200

[[redirects]]
  from = "/curso/:courseId"
  to = "/curso.html?courseId=:courseId"
  status = 200

